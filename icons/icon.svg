<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">直式運算練習板</title>
  <desc id="desc">方格紙背景上的算字，搭配加減乘符號。</desc>
  <defs>
    <linearGradient id="bg" x1="74" y1="50" x2="438" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6fd1"/>
      <stop offset="0.52" stop-color="#087f8c"/>
      <stop offset="1" stop-color="#f2c14e"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#17242d" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="28" y="28" width="456" height="456" rx="88" fill="url(#grid)" opacity="0.95"/>

  <g filter="url(#softShadow)">
    <rect x="86" y="90" width="340" height="332" rx="54" fill="#fffdf7"/>
    <path d="M128 164H384M128 236H384M128 308H384" stroke="#d6e4df" stroke-width="12" stroke-linecap="round"/>
    <path d="M184 126V382M256 126V382M328 126V382" stroke="#d6e4df" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g font-family="Microsoft JhengHei, PingFang TC, Noto Sans TC, system-ui, sans-serif" font-weight="900">
    <text x="256" y="326" text-anchor="middle" font-size="178" fill="#17242d">算</text>
    <g font-size="60" text-anchor="middle">
      <rect x="54" y="62" width="108" height="108" rx="28" fill="#356ac3"/>
      <text x="108" y="136" fill="#ffffff">+</text>
      <rect x="350" y="62" width="108" height="108" rx="28" fill="#e95d4f"/>
      <text x="404" y="136" fill="#ffffff">−</text>
      <rect x="202" y="370" width="108" height="108" rx="28" fill="#087f8c"/>
      <text x="256" y="444" fill="#ffffff">×</text>
    </g>
  </g>
</svg>
